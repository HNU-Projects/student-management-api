services:
  db:
    image: postgres:16-alpine
    container_name: student_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: student_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: student_redis
    ports:
      - "6379:6379"

  api:
    build: ./backend
    container_name: student_api
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:password@db:5432/student_management
      REDIS_URL: redis://redis:6379/0
      APP_NAME: "Student Management API (Docker)"
      SECRET_KEY: "docker_secret_key_change_me"
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      JWT_ALGORITHM: HS256
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    restart: always

  # ---- Monitoring stack ----

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: student_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: always

  grafana:
    image: grafana/grafana:11.1.0
    container_name: student_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: always

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: